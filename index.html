<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tizen TV</title>
<meta name="viewport" content="width=1920, height=1080">

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>

<style>
body {
  margin:0;
  background:#141414;
  color:white;
  font-family:sans-serif;
  overflow:hidden;
}

/* Splash */
#splash {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  font-size:48px;
  transition:opacity .5s;
}

/* Rows */
.row { margin:20px; }
.row-scroll { display:flex; gap:15px; }

/* Tiles */
.tile {
  min-width:220px;
  transition:transform .15s ease;
  will-change: transform;
}
.tile img { width:100%; border-radius:10px; }

.tile.active {
  transform:scale(1.2);
  outline:3px solid #e50914;
}

/* Player */
.player {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
}
</style>
</head>

<body>

<div id="splash">📺 Tizen TV</div>
<div id="app"></div>

<script src="app.js"></script>
</body>
</html>
