<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live TV</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- Browse View -->
  <div id="browseView" class="browse-view">
    <div class="top-bar">
      <h1 class="logo">Live TV</h1>
      <div class="category-tabs" id="categoryTabs">
        <!-- Filled by JS -->
      </div>
    </div>

    <div class="rows-container" id="rowsContainer">
      <!-- Rows filled by JS -->
    </div>

    <div class="footer-help">
      <p>▲▼ move between rows, ◀▶ move in row, Enter play, Green reload</p>
    </div>
  </div>

  <!-- Player View (hidden initially) -->
  <div id="playerView" class="player-view hidden">
    <div class="player-header">
      <button id="backButton" class="back-btn">← Back</button>
      <h2 id="nowPlayingTitle">Now Playing</h2>
    </div>
    <video id="video" controls autoplay></video>
    <div class="player-footer" id="playerStatus">Idle</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="./app.js"></script>
</body>
</html>
