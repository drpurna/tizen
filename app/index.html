<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>IPTV</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- ════════════════════════════════════════════════
       SPLASH SCREEN  (YouTube TV style)
       Fades out once playlist is ready
       ════════════════════════════════════════════════ -->
  <div id="splash">
    <div class="splash-inner">
      <div class="splash-logo">
        <span class="splash-icon">▶</span>
        <span class="splash-wordmark">IPTV</span>
      </div>
      <div class="splash-bar-wrap">
        <div class="splash-bar" id="splashBar"></div>
      </div>
      <div class="splash-sub" id="splashSub">Loading playlist…</div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════
       MAIN APP  (hidden until splash exits)
       ════════════════════════════════════════════════ -->
  <div class="app" id="app" style="opacity:0;pointer-events:none;">

    <aside class="sidebar" id="sidebar">

      <div class="brand">
        <span class="splash-icon brand-icon">▶</span>
        <span class="brand-title">IPTV</span>
      </div>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="searchInput" type="text" placeholder="Search channels…" spellcheck="false" autocomplete="off" />
      </div>

      <div class="tab-bar" id="tabBar">
        <button class="tab active" data-idx="0">Telugu</button>
        <button class="tab" data-idx="1">India</button>
        <button class="tab" data-idx="2">Sports</button>
        <button class="tab" data-idx="3">Movies</button>
      </div>

      <div class="list-head">
        <span class="lbl">CHANNELS</span>
        <span id="countBadge">0</span>
      </div>

      <ul id="channelList"></ul>

      <!-- Remote number dialer overlay -->
      <div class="ch-dialer" id="chDialer">
        <span id="chDialerNum"></span>
      </div>

      <div class="hint-bar">
        <span class="hint-item"><span class="dot red"></span>Reload</span>
        <span class="hint-item"><span class="dot green"></span>Playlist</span>
        <span class="hint-item"><span class="dot yellow"></span>Search</span>
        <span class="hint-item"><span class="dot blue"></span>Fullscreen</span>
      </div>

    </aside>

    <main class="player-area" id="playerArea">

      <div class="player-header">
        <div class="np-info">
          <div class="np-ch-num" id="npChNum"></div>
          <h2 id="nowPlaying">Select a channel</h2>
          <span id="nowGroup"></span>
        </div>
        <span id="statusBadge" class="status-badge idle">IDLE</span>
      </div>

      <div class="video-wrap" id="videoWrap">
        <video id="video" autoplay playsinline webkit-playsinline></video>
        <div class="video-overlay" id="videoOverlay">
          <div class="overlay-icon">▶</div>
          <p class="overlay-hint">Select a channel to play<br><span>ENTER · fullscreen</span></p>
        </div>
        <div class="fs-hint" id="fsHint">Press BACK or ← to exit fullscreen</div>
      </div>

      <div class="load-bar" id="loadBar"></div>

    </main>
  </div>

  <script src="./hls.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
