<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live TV</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <!-- Top row: categories only (single row) -->
    <div class="top-row">
      <div class="category-bar" id="categoryBar"></div>
    </div>

    <!-- Left sidebar: channel list with search -->
    <aside class="channel-sidebar" id="channelSidebar">
      <h1>Live TV</h1>
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="Search channel..." />
      </div>
      <ul id="channelList"></ul>
    </aside>

    <!-- Main area: video player (right side) -->
    <main class="player-area" id="playerArea">
      <video id="video" controls autoplay></video>
      <div class="player-header">
        <h2 id="nowPlaying">No channel selected</h2>
        <span id="statusText">Idle</span>
      </div>
    </main>

    <!-- Footer help -->
    <div class="footer help">
      <p>Remote: ↑↓ select channel, ←→ focus, Enter play, double‑click channel / Enter (video focused) toggles fullscreen, Green key reloads playlist.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="./app.js"></script>
</body>
</html>
