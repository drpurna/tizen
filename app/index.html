<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tizen TV</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PLAYER -->
  <div id="player"></div>

  <!-- HEADER -->
  <div id="header">
    <div class="logo">Tizen TV</div>
    <div class="actions">
      <div class="icon" id="searchBtn">🔍</div>
      <div class="icon" id="addBtn">➕</div>
    </div>
  </div>

  <!-- UI OVERLAY -->
  <div id="ui">
    <div id="overlay"></div>
    <div id="rows"></div>
  </div>

  <!-- SPLASH SCREEN (YouTube TV style) -->
  <div id="splash">
    <div class="splash-inner">
      <div class="splash-logo">
        <div class="play-triangle"></div>
      </div>
      <div class="splash-text">Tizen TV</div>
    </div>
  </div>

  <!-- HLS.js for browser fallback -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="app.js"></script>
</body>
</html>
